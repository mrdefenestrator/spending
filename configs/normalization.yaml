leading_patterns:
  # Leading numeric location/store codes: "041 TORCHYS", "10401D CAVA", "2201 - SPRINKLERWHSE"
  - "^\\d{3,5}[A-Z]?\\s*[-\\s]\\s*"

trailing_patterns:
  # Legal entity suffixes with optional address: "NOBU MALIBU, LLC 22706 PACIFIC C"
  - ",\\s+(?:LLC|INC|CORP|LTD)\\.?\\b.*$"
  # Location suffix after dash: "PARKWELL - CHERRY CREEK", "SOME STORE - DENVER CO"
  - "\\s+-\\s+[A-Z]{2,}[A-Z\\s]*$"
  # City, State with comma: "CHICAGO, IL" or "CHICAGO, IL 60601"
  - "\\s+[A-Z]+,\\s*[A-Z]{2}\\s*\\d{0,5}$"
  # State + ZIP without comma: " NY 10001"
  - "\\s+[A-Z]{2}\\s+\\d{5}$"
  # Reference numbers: 3+ digits optionally preceded by # or *
  - "\\s*[#*]?\\d{3,}$"
  # Alphanumeric transaction IDs: must contain at least one digit or special char
  - "\\s+[A-Z0-9*]*[0-9*][A-Z0-9*]{3,}$"
  # Transaction IDs appended directly after *: "AMAZON.COM*178XH1U33", "SWA*2OVWTBG"
  - "\\*[A-Z0-9]{5,}$"
  # DoorDash date-based order suffixes: "DOORDASH*02/13-3 ORDER"
  - "\\*\\d{2}/\\d{2}-\\d+ ORDER$"
  # Partial phone numbers left after digit stripping: "800-782-" or "800-606-"
  - "\\s+\\d{3}-\\d{3,4}-?$"
  # Full phone numbers embedded in names: "8007827282 2401 UTAH A"
  - "\\s+\\d{10,}.*$"
  # Location suffix after @: "AUTOWASH @ NORTHFIELD"
  - "\\s+@\\s+.+$"
  # Lyft ride timestamp suffixes: "LYFT   *RIDE MON 1PM" (multi-space before *RIDE)
  - "\\s*\\*RIDE.*$"
  # NAME* DESCRIPTION format: "PELOTON* MEMBERSHIP 441 NINTH AV", "FOUR SEAS* TIP"
  - "\\*\\s+\\S+.*$"
  # iPhone installment payment suffixes: "IPHONE CITIZ*PMT 5 OF 24"
  - "\\*PMT\\s+\\d+\\s+OF\\s+\\d+$"
  # eBay-style order number suffixes: "EBAY O*04-14111-"
  - "\\s+[A-Z]\\*[\\d-]+$"
  # Orphan trailing hash after store number was stripped: "CIRCLE K #"
  - "\\s*#\\s*$"
  # Trailing dash artifacts from truncated descriptions: "JIMMY JOHNS -"
  - "\\s*-\\s*$"
  # Store number + trailing text: "MICRO CENTER #181 RETAIL", "ARCO #42605 AMPM"
  - "\\s*#\\d+\\b.*$"
  # Apple Card installment suffixes: "MONTHLY INSTALLMENTS (3 OF 12)"
  - "\\s*\\(\\d+\\s+OF\\s+\\d+\\)$"

