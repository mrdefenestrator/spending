<tr id="account-row-{{ account.id }}" class="border-b dark:border-gray-600 bg-blue-50 dark:bg-gray-700">
    <td colspan="5" class="px-4 py-3">
        <form hx-post="/accounts/{{ account.id }}"
              hx-target="#account-row-{{ account.id }}"
              hx-swap="outerHTML"
              class="flex flex-wrap items-center gap-3">
            <input type="text" name="name" value="{{ account.name }}" placeholder="Name"
                   class="border dark:border-gray-600 rounded px-2 py-1.5 text-sm w-48 bg-white dark:bg-gray-600 dark:text-gray-100">
            <input type="text" name="institution" value="{{ account.institution }}" placeholder="Institution"
                   class="border dark:border-gray-600 rounded px-2 py-1.5 text-sm w-40 bg-white dark:bg-gray-600 dark:text-gray-100">
            <select name="account_type" class="border dark:border-gray-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-gray-600 dark:text-gray-100">
                <option value="checking" {{ 'selected' if account.account_type == 'checking' }}>Checking</option>
                <option value="savings" {{ 'selected' if account.account_type == 'savings' }}>Savings</option>
                <option value="credit_card" {{ 'selected' if account.account_type == 'credit_card' }}>Credit Card</option>
                <option value="other" {{ 'selected' if account.account_type == 'other' }}>Other</option>
            </select>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">Save</button>
            <button type="button" class="text-gray-500 dark:text-gray-400 text-sm"
                    hx-get="/accounts/{{ account.id }}/row"
                    hx-target="#account-row-{{ account.id }}"
                    hx-swap="outerHTML">Cancel</button>
        </form>
    </td>
</tr>
