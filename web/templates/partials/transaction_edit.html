<tr id="edit-{{ txn_id }}" class="bg-blue-50 dark:bg-gray-700 border-b dark:border-gray-600">
    <td colspan="7" class="px-4 py-3">
        <form hx-post="/transactions/{{ txn_id }}/category"
              hx-target="#txn-row-{{ txn_id }}"
              hx-swap="outerHTML"
              class="flex items-center gap-3">
            <select name="category" class="border dark:border-gray-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-gray-600 dark:text-gray-100">
                {% for c in categories %}
                <option value="{{ c }}" {{ 'selected' if current_category == c }}>{{ c }}</option>
                {% endfor %}
            </select>
            <label class="flex items-center gap-1.5 text-sm dark:text-gray-300 cursor-pointer">
                <input type="checkbox" name="apply_to_merchant" checked>
                Also apply to all from this merchant
            </label>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">Save</button>
            <button type="button" class="text-gray-500 dark:text-gray-400 text-sm"
                    onclick="this.closest('tr').remove()">Cancel</button>
        </form>
    </td>
</tr>
