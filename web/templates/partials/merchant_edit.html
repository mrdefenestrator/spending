<tr id="merchant-row-{{ merchant.id }}" class="border-b bg-blue-50">
    <td colspan="6" class="px-4 py-3">
        <form hx-post="/merchants/{{ merchant.id }}/category"
              hx-target="#merchant-row-{{ merchant.id }}"
              hx-swap="outerHTML"
              class="flex items-center gap-3">
            <input type="hidden" name="merchant_name" value="{{ merchant.merchant_name }}">
            <span class="text-sm font-medium text-gray-700">{{ merchant.merchant_name }}</span>
            <select name="category" class="border rounded px-2 py-1.5 text-sm">
                {% for c in categories %}
                <option value="{{ c }}" {{ 'selected' if merchant.category == c }}>{{ c }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">Save</button>
            <button type="button" class="text-gray-500 text-sm"
                    hx-get="/merchants/{{ merchant.id }}/row"
                    hx-target="#merchant-row-{{ merchant.id }}"
                    hx-swap="outerHTML">Cancel</button>
        </form>
    </td>
</tr>
