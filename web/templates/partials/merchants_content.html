{% set ctrl = "border border-gray-300 dark:border-gray-600 rounded-md px-3 h-8 text-sm bg-white dark:bg-gray-700 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" %}
<div class="mb-4 flex flex-wrap gap-2 items-center">
    <input type="search" name="search" value="{{ search }}" placeholder="Search merchants..."
           hx-get="/merchants" hx-target="#content" hx-include="[name]" hx-push-url="true"
           hx-trigger="keyup changed delay:300ms"
           class="w-56 {{ ctrl }}">
    <select name="category" hx-get="/merchants" hx-target="#content" hx-include="[name]" hx-push-url="true"
            class="w-40 {{ ctrl }}">
        <option value="">All Categories</option>
        {% for c in categories %}
        <option value="{{ c }}" {{ 'selected' if selected_category == c }}>{{ c }}</option>
        {% endfor %}
    </select>
    <select name="source" hx-get="/merchants" hx-target="#content" hx-include="[name]" hx-push-url="true"
            class="w-32 {{ ctrl }}">
        <option value="">All Sources</option>
        <option value="api" {{ 'selected' if selected_source == 'api' }}>Auto</option>
        <option value="manual" {{ 'selected' if selected_source == 'manual' }}>Manual</option>
    </select>
    <input type="hidden" name="sort" value="{{ sort or '' }}">
    <input type="hidden" name="dir" value="{{ dir or '' }}">
</div>
{% include "partials/merchant_rows.html" %}
